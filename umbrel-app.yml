manifestVersion: 1
id: denarius
category: finance
name: Denarius
version: "1.0.0"
tagline: Self-hosted personal finance tracker for families
description: >-
  Denarius is a self-hosted personal finance application for tracking accounts,
  transactions, budgets, subscriptions, recurring bills, mortgages, and net
  worth. Built for families with shared data and secure multi-user JWT
  authentication. Includes a REST API for future mobile app integration.

  Features:
  - Dashboard with net worth, monthly spending, and upcoming bills
  - Transaction management with CSV export
  - Monthly budgets with progress tracking
  - Subscription and recurring bill management
  - Mortgage amortization and extra-payment calculator
  - Net worth tracker with historical chart
  - Reports: spending by category, income vs expense, trends
  - Scheduled auto-posting of recurring items
  - Daily database backups

releaseNotes: Initial release — full personal finance tracking suite.
